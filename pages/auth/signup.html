<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | MaintainIQ</title>
    <meta name="description" content="Create a MaintainIQ account." />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/index.css" />
    <link rel="stylesheet" href="../../css/auth/index.css" />
  </head>
  <body>
    <div class="auth-layout">
      <div class="auth-card">
        <div class="auth-header">
          <a href="../../index.html" class="auth-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 22px; height: 22px;">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            MaintainIQ
          </a>
          <h1>Create your account</h1>
          <p>Sign up to start managing your assets.</p>
        </div>

        <form class="auth-form" id="signup-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="signup-name">Full Name</label>
            <input type="text" class="form-input" id="signup-name" placeholder="John Doe" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-email">Email</label>
            <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <input type="password" class="form-input" id="signup-password" placeholder="Create a password" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-emerald auth-submit">Create Account</button>
        </form>

        <div class="auth-footer-text">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>

    <script type="module" src="../../js/auth/index.js"></script>
  </body>
</html>
