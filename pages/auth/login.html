<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | MaintainIQ</title>
    <meta name="description" content="Sign in to MaintainIQ." />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/index.css" />
    <link rel="stylesheet" href="../../css/auth/index.css" />
  </head>
  <body>
    <div class="auth-layout">
      <div class="auth-card">
        <div class="auth-header">
          <a href="../../index.html" class="auth-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 22px; height: 22px;">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            MaintainIQ
          </a>
          <h1>Welcome back</h1>
          <p>Sign in to your account to continue.</p>
        </div>

        <form class="auth-form" id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-emerald auth-submit">Sign In</button>
        </form>

        <div class="auth-footer-text">
          Don't have an account? <a href="signup.html">Create one</a>
        </div>
      </div>
    </div>

    <script type="module" src="../../js/auth/index.js"></script>
  </body>
</html>
